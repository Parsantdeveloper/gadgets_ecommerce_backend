version: "3.9"

networks:
  shared_proxy:
    external: true
  glorious_internal:
    driver: bridge

volumes:
  redis_data:
    driver: local

services:
  # ────────────────────────────────────────────
  # Redis - Session & Cache Store
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: glorious_redis
    restart: unless-stopped
    
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode yes
      --appendonly yes
      --appendfsync everysec
    
    volumes:
      - redis_data:/data
    
    networks:
      - glorious_internal
    
    expose:
      - "6379"
    
    # Resource limits
    mem_limit: 256m
    memswap_limit: 256m
    cpus: "0.5"
    
    # Security
    security_opt:
      - no-new-privileges:true
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────
  # Glorious Backend
  # ────────────────────────────────────────────
  glorious_backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glorious_backend
    restart: unless-stopped
    
    env_file: .env
    
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    
    depends_on:
      redis:
        condition: service_healthy
    
    expose:
      - "4000"
    
    networks:
      - shared_proxy
      - glorious_internal
    
    # Resource limits
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "0.75"
    
    # Security
    security_opt:
      - no-new-privileges:true
    
    # Read-only root filesystem except tmp
    read_only: true
    tmpfs:
      - /tmp
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"